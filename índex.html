<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronograma de Trabajo - Marzo a Mayo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        .day-card { min-height: 100px; border: 1px solid #e5e7eb; transition: all 0.2s; }
        .day-card:hover { background-color: #f9fafb; }
        .completed { text-decoration: line-through; color: #9ca3af; }
    </style>
</head>
<body class="bg-gray-50 p-4 md:p-10">

    <div class="max-w-6xl mx-auto bg-white shadow-xl rounded-xl overflow-hidden">
        <div class="bg-indigo-600 p-6 text-white flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold">Cronograma de Actividades 2026</h1>
                <p class="opacity-80">Marzo - Abril - Mayo</p>
            </div>
            <div class="text-right">
                <span class="text-sm block">Tareas Finalizadas</span>
                <span id="globalCounter" class="text-3xl font-bold">0</span>
            </div>
        </div>

        <div class="flex border-b">
            <button onclick="showMonth(2)" class="flex-1 py-4 font-semibold hover:bg-indigo-50 border-b-2 border-indigo-600" id="btn-2">Marzo</button>
            <button onclick="showMonth(3)" class="flex-1 py-4 font-semibold hover:bg-indigo-50 border-b-2 border-transparent" id="btn-3">Abril</button>
            <button onclick="showMonth(4)" class="flex-1 py-4 font-semibold hover:bg-indigo-50 border-b-2 border-transparent" id="btn-4">Mayo</button>
        </div>

        <div class="p-4">
            <div class="calendar-grid text-center font-bold text-gray-500 mb-2">
                <div>Dom</div><div>Lun</div><div>Mar</div><div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div>
            </div>
            <div id="calendarContainer" class="calendar-grid">
                </div>
        </div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('calendarTasks')) || {};
        let currentMonth = 2; // Marzo

        function renderCalendar(month) {
            const container = document.getElementById('calendarContainer');
            container.innerHTML = '';
            
            // Configuración del mes (Año 2026)
            const year = 2026;
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            // Espacios en blanco
            for (let i = 0; i < firstDay; i++) {
                container.innerHTML += `<div class="day-card bg-gray-100"></div>`;
            }

            // Días del mes
            for (let day = 1; day <= daysInMonth; day++) {
                const dateKey = `${year}-${month + 1}-${day}`;
                const dayTasks = tasks[dateKey] || [];
                
                let tasksHtml = dayTasks.map((t, index) => `
                    <div class="text-xs mt-1 p-1 rounded ${t.done ? 'bg-green-100 completed' : 'bg-blue-100 text-blue-700'} flex justify-between items-center">
                        <span onclick="toggleTask('${dateKey}', ${index})" class="cursor-pointer">${t.text}</span>
                        <button onclick="deleteTask('${dateKey}', ${index})" class="text-red-500 ml-1">×</button>
                    </div>
                `).join('');

                container.innerHTML += `
                    <div class="day-card p-2 flex flex-col justify-between">
                        <span class="font-bold text-gray-700">${day}</span>
                        <div class="flex-grow overflow-y-auto">${tasksHtml}</div>
                        <button onclick="addTask('${dateKey}')" class="text-xs text-indigo-500 font-bold mt-1 hover:underline">+ Tarea</button>
                    </div>
                `;
            }
            updateCounter();
        }

        function addTask(dateKey) {
            const text = prompt("Nombre de la tarea:");
            if (!text) return;
            if (!tasks[dateKey]) tasks[dateKey] = [];
            tasks[dateKey].push({ text, done: false });
            save();
        }

        function toggleTask(dateKey, index) {
            tasks[dateKey][index].done = !tasks[dateKey][index].done;
            save();
        }

        function deleteTask(dateKey, index) {
            tasks[dateKey].splice(index, 1);
            save();
        }

        function save() {
            localStorage.setItem('calendarTasks', JSON.stringify(tasks));
            renderCalendar(currentMonth);
        }

        function updateCounter() {
            let count = 0;
            Object.values(tasks).forEach(day => {
                day.forEach(t => { if (t.done) count++; });
            });
            document.getElementById('globalCounter').innerText = count;
        }

        function showMonth(m) {
            currentMonth = m;
            document.querySelectorAll('button[id^="btn-"]').forEach(btn => btn.classList.replace('border-indigo-600', 'border-transparent'));
            document.getElementById(`btn-${m}`).classList.replace('border-transparent', 'border-indigo-600');
            renderCalendar(m);
        }

        // Inicializar
        renderCalendar(2);
    </script>
</body>
</html>
