<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronograma Casa Áurea - Tatiz Tsunede</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        .day-card { min-height: 110px; border: 1px solid #e5e7eb; transition: all 0.2s; }
        .day-card:hover { background-color: #f9fafb; border-color: #6366f1; }
        .completed { text-decoration: line-through; color: #9ca3af !important; background-color: #f3f4f6 !important; }
        .task-item { font-size: 0.7rem; margin-top: 2px; padding: 2px 4px; border-radius: 4px; cursor: pointer; }
        /* Estilo para el botón flotante */
        .whatsapp-btn { position: fixed; bottom: 20px; right: 20px; background-color: #25d366; color: white; padding: 12px 20px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: transform 0.3s; z-index: 1000; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .whatsapp-btn:hover { transform: scale(1.05); background-color: #128c7e; }
    </style>
</head>
<body class="bg-slate-100 p-4 md:p-8 pb-24">

    <div class="max-w-6xl mx-auto bg-white shadow-2xl rounded-2xl overflow-hidden">
        <div class="bg-indigo-900 p-6 text-white flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold">Casa Áurea Studio: Cronograma TNT</h1>
                <p class="text-indigo-200">Seguimiento de Actividades - Cliente: Tatiz Tsunede</p>
            </div>
            <div class="bg-indigo-800 p-4 rounded-lg text-center min-w-[150px]">
                <span class="text-xs uppercase tracking-widest opacity-70">Progreso Total</span>
                <div class="flex items-center justify-center gap-2">
                    <span id="globalCounter" class="text-3xl font-bold text-green-400">0</span>
                    <span class="text-xl opacity-50">/</span>
                    <span id="totalTasks" class="text-xl opacity-50">0</span>
                </div>
            </div>
        </div>

        <div class="flex bg-indigo-50 border-b border-indigo-100">
            <button onclick="showMonth(2)" class="flex-1 py-4 font-bold transition" id="btn-2">MARZO</button>
            <button onclick="showMonth(3)" class="flex-1 py-4 font-bold transition" id="btn-3">ABRIL</button>
            <button onclick="showMonth(4)" class="flex-1 py-4 font-bold transition" id="btn-4">MAYO</button>
        </div>

        <div class="p-6">
            <div class="calendar-grid text-center font-bold text-indigo-400 text-xs uppercase mb-4 tracking-tighter">
                <div>Dom</div><div>Lun</div><div>Mar</div><div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div>
            </div>
            <div id="calendarContainer" class="calendar-grid gap-1"></div>
        </div>
    </div>

    <a href="#" id="whatsappLink" target="_blank" class="whatsapp-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.588-5.946 0-6.556 5.332-11.888 11.888-11.888 3.176 0 6.161 1.237 8.404 3.48s3.481 5.229 3.481 8.406c0 6.556-5.333 11.888-11.889 11.888-2.013 0-3.987-.512-5.736-1.486l-6.247 1.709zm6.294-4.143c1.554.921 3.14 1.403 4.843 1.403 5.4 0 9.795-4.394 9.795-9.794 0-5.399-4.394-9.794-9.795-9.794-2.618 0-5.078 1.02-6.928 2.87-1.85 1.849-2.869 4.308-2.869 6.924 0 1.764.512 3.441 1.48 4.965l-1.01 3.692 3.789-.967z"/></svg>
        Confirmar Revisión
    </a>

    <script>
        // CONFIGURACIÓN: Pon aquí tu número de teléfono (con código de país, sin el +)
        const TU_TELEFONO = "+52 5624539573"; // Ejemplo México: 521 + número

        const MASTER_TASKS = {
            "2026-3-10": [{ text: "Sesión de fotos: Personaje Alley", done: false }],
            "2026-3-20": [{ text: "Revisión de redes sociales (150k)", done: false }],
            "2026-4-5":  [{ text: "Pruebas de vestuario TNT", done: false }],
            "2026-4-15": [{ text: "Lanzamiento Promo Video", done: false }],
            "2026-5-10": [{ text: "Logística de viaje y hotel", done: false }],
            "2026-5-25": [{ text: "Entrega de kit de prensa", done: false }]
        };

        let currentMonth = 2;
        let userProgress = JSON.parse(localStorage.getItem('tnt_progress')) || {};

        function renderCalendar(month) {
            const container = document.getElementById('calendarContainer');
            container.innerHTML = '';
            const year = 2026;
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            document.querySelectorAll('button[id^="btn-"]').forEach(b => {
                b.classList.remove('bg-white', 'text-indigo-600', 'shadow-inner');
                b.classList.add('text-indigo-400');
            });
            document.getElementById(`btn-${month}`).classList.add('bg-white', 'text-indigo-600', 'shadow-inner');

            for (let i = 0; i < firstDay; i++) {
                container.innerHTML += `<div class="day-card bg-gray-50/50 border-none"></div>`;
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateKey = `${year}-${month + 1}-${day}`;
                const dayTasks = MASTER_TASKS[dateKey] || [];
                
                let tasksHtml = dayTasks.map((t, idx) => {
                    const isDone = userProgress[dateKey + '-' + idx] || false;
                    return `
                        <div onclick="toggleTask('${dateKey}', ${idx})" 
                             class="task-item ${isDone ? 'completed bg-gray-100 text-gray-400' : 'bg-indigo-100 text-indigo-700 font-medium border border-indigo-200'}">
                            ${t.text}
                        </div>
                    `;
                }).join('');

                container.innerHTML += `
                    <div class="day-card p-2 flex flex-col">
                        <span class="text-sm font-bold ${dayTasks.length > 0 ? 'text-indigo-600' : 'text-gray-400'}">${day}</span>
                        <div class="mt-1">${tasksHtml}</div>
                    </div>
                `;
            }
            calculateStats();
        }

        function toggleTask(dateKey, idx) {
            const key = dateKey + '-' + idx;
            userProgress[key] = !userProgress[key];
            localStorage.setItem('tnt_progress', JSON.stringify(userProgress));
            renderCalendar(currentMonth);
        }

        function calculateStats() {
            let total = 0;
            let finished = 0;
            Object.keys(MASTER_TASKS).forEach(date => {
                MASTER_TASKS[date].forEach((task, idx) => {
                    total++;
                    if (userProgress[date + '-' + idx]) finished++;
                });
            });

            document.getElementById('globalCounter').innerText = finished;
            document.getElementById('totalTasks').innerText = total;

            // Actualizar el link de WhatsApp
            const msg = `Hola Casa Áurea, soy Tatiz. He revisado el cronograma para la TNT. Llevamos un progreso de ${finished} de ${total} tareas completadas.`;
            document.getElementById('whatsappLink').href = `https://wa.me/${TU_TELEFONO}?text=${encodeURIComponent(msg)}`;
        }

        function showMonth(m) {
            currentMonth = m;
            renderCalendar(m);
        }

        renderCalendar(2);
    </script>
</body>
</html>
